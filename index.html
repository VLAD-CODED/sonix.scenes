<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SONIX STUDIO ELITE - CAPTION AI</title>
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SIDEBAR STYLE --- */
        .sidebar { 
            width: 350px; background: #111; padding: 20px; 
            border-right: 1px solid #333; display: flex; 
            flex-direction: column; z-index: 10; overflow-y: auto; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); 
        }
        
        .main { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: #000; position: relative; 
        }

        /* --- PREVIEW WINDOW --- */
        .preview-box {
            position: relative; width: 90%; max-width: 400px;
            aspect-ratio: 9/16; border: 1px solid #222;
            background: #000; overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #subs {
            position: absolute; bottom: 20%; width: 90%; left: 5%;
            color: #fff200; font-size: 40px; font-weight: 900;
            text-transform: uppercase; text-shadow: 4px 4px 0px #000;
            pointer-events: none; line-height: 1; text-align: center;
            transition: transform 0.1s;
        }

        /* --- UI ELEMENTS --- */
        .btn { 
            background: var(--neon); color: #000; border: none; 
            padding: 14px; font-weight: bold; cursor: pointer; 
            margin: 10px 0; border-radius: 4px; width: 100%; 
            text-transform: uppercase; transition: 0.2s; 
        }
        .btn:hover { filter: brightness(1.2); box-shadow: 0 0 15px var(--neon); }
        .btn-blue { background: #00d9ff; }
        
        .ai-box { 
            background: rgba(0, 255, 65, 0.1); border: 1px solid var(--neon); 
            padding: 15px; margin: 10px 0; border-radius: 4px; 
            display: none; font-size: 11px; 
        }
        
        label { font-size: 10px; color: #888; display: block; margin-top: 15px; font-weight: bold; text-transform: uppercase; }
        
        #console { 
            flex-grow: 1; background: #000; padding: 12px; 
            font-size: 10px; color: #00ff41; border: 1px solid #222; 
            margin-top: 10px; overflow-y: auto; font-family: monospace; 
        }

        .settings-icon { position: absolute; top: 10px; right: 10px; cursor: pointer; opacity: 0.5; }
        .settings-icon:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0; font-size: 20px;">STUDIO ELITE</h2>
    <p style="font-size:9px; color:#555; margin-bottom:20px;">CAPTION ENGINE V1.2 | AI OPTIMIZED</p>
    
    <button class="btn btn-blue" onclick="document.getElementById('upload').click()">1. LOAD SOURCE VIDEO</button>
    <input type="file" id="upload" accept="video/*" style="display:none">

    <div id="ai-suggest" class="ai-box">
        <strong style="color:#fff;">AI ANALYSIS:</strong><br>
        <span id="ai-text">Waiting for media stream...</span>
    </div>

    <label>Caption Style</label>
    <select style="width:100%; background:#000; color:var(--neon); border:1px solid #444; padding:8px;">
        <option>PHONK POP (Yellow)</option>
        <option>MATRIX (Green)</option>
        <option>CYBERPUNK (Pink)</option>
    </select>

    <label>Animation Intensity</label>
    <input type="range" min="1" max="1.5" step="0.1" value="1.3">
    
    <button class="btn" id="processBtn" style="display:none;">2. START AI CAPTIONING</button>
    
    <div id="console">> SYSTEM READY...</div>
    <button class="btn" style="background:#222; color:#555; font-size:9px;" onclick="resetKey()">RESET API ACCESS</button>
</div>

<div class="main">
    <div class="preview-box">
        <video id="v" playsinline></video>
        <div id="subs">READY</div>
    </div>
</div>

<script>
    let DEEPGRAM_KEY = localStorage.getItem('deepgram_key');
    const v = document.getElementById('v');
    const subs = document.getElementById('subs');
    const logger = document.getElementById('console');
    const aiBox = document.getElementById('ai-suggest');
    const aiText = document.getElementById('ai-text');
    const processBtn = document.getElementById('processBtn');
    let wordsData = [];

    function log(m) { 
        logger.innerHTML += `<div>> ${m}</div>`; 
        logger.scrollTop = logger.scrollHeight; 
    }

    document.getElementById('upload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            v.src = URL.createObjectURL(file);
            v.onloadedmetadata = () => {
                log(`VIDEO LOADED: ${v.videoWidth}x${v.videoHeight}`);
                aiBox.style.display = 'block';
                aiText.innerText = "Video detected. Ready for Deepgram Nova-2 transcription.";
                processBtn.style.display = 'block';
            };
        }
    };

    processBtn.onclick = async () => {
        if (!DEEPGRAM_KEY) {
            DEEPGRAM_KEY = prompt("ENTER DEEPGRAM API KEY:");
            if (DEEPGRAM_KEY) localStorage.setItem('deepgram_key', DEEPGRAM_KEY);
            else return;
        }

        const file = document.getElementById('upload').files[0];
        log("INITIALIZING AI ANALYSER...");
        processBtn.disabled = true;
        processBtn.innerText = "PROCESSING...";

        try {
            const response = await fetch('https://api.deepgram.com/v1/listen?smart_format=true&model=nova-2', {
                method: 'POST',
                headers: { 
                    'Authorization': `Token ${DEEPGRAM_KEY}`, 
                    'Content-Type': file.type 
                },
                body: file
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            wordsData = data.results.channels[0].alternatives[0].words;
            log(`SUCCESS: ${wordsData.length} WORDS SYNCED.`);
            aiText.innerText = "AI Processing complete. Captions are now locked to timeline.";
            subs.innerText = "SYNCED";
            processBtn.innerText = "RE-PROCESS VIDEO";
            processBtn.disabled = false;
        } catch (err) {
            log("CRITICAL ERROR: INVALID KEY OR UPLOAD.");
            localStorage.removeItem('deepgram_key');
            DEEPGRAM_KEY = null;
            processBtn.disabled = false;
            processBtn.innerText = "RETRY ATTEMPT";
        }
    };

    v.ontimeupdate = () => {
        const currentTime = v.currentTime;
        const currentWord = wordsData.find(w => currentTime >= w.start && currentTime <= w.end);
        
        if (currentWord) {
            const wordText = currentWord.word.toUpperCase();
            if (subs.innerText !== wordText) {
                subs.innerText = wordText;
                // Studio Elite Pop Effect
                subs.style.transform = "scale(1.3) rotate(-2deg)";
                setTimeout(() => { subs.style.transform = "scale(1) rotate(0deg)"; }, 50);
            }
        }
    };

    v.onclick = () => v.paused ? v.play() : v.pause();

    function resetKey() {
        localStorage.removeItem('deepgram_key');
        alert("API ACCESS REVOKED.");
        location.reload();
    }
</script>

</body>
</html>
