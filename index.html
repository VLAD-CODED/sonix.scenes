<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SONIX | QuickCap AI</title>
    <style>
        :root {
            --bg: #000000;
            --container-bg: #1a1a1a;
            --accent: #00ff41;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0; background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100dvh; padding: 20px;
        }

        h1 { color: var(--accent); font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 20px; }

        /* --- PREVIEW WINDOW (SONIX STYLE) --- */
        .preview-container {
            position: relative; width: 100%; max-width: 340px;
            aspect-ratio: 9/16; background: #000;
            border-radius: 20px; overflow: hidden;
            border: 1px solid var(--accent);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }

        /* --- CAPTION STYLE (BOUNCY PHONK STYLE) --- */
        #subs {
            position: absolute; bottom: 25%; width: 90%; left: 5%;
            color: #fff200; font-size: 38px; font-weight: 900;
            text-transform: uppercase; text-shadow: 3px 3px 0px #000;
            pointer-events: none; line-height: 1; text-align: center;
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- CONTROLS (SONIX BUBBLE STYLE) --- */
        .controls {
            margin-top: 25px; display: flex; flex-direction: column;
            gap: 12px; width: 100%; max-width: 340px;
        }

        .btn {
            padding: 15px; border-radius: 30px; border: 1px solid var(--accent);
            font-weight: bold; cursor: pointer; font-size: 0.9rem;
            transition: 0.3s; text-transform: uppercase;
        }

        .btn-choose { background: transparent; color: var(--accent); }
        .btn-process { background: var(--accent); color: #000; display: none; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

        #status {
            text-align: center; color: var(--accent);
            font-size: 0.75rem; margin-top: 10px; opacity: 0.7;
        }

        /* Settings Icon */
        .settings-btn {
            position: fixed; top: 20px; right: 20px;
            background: var(--container-bg); border: 1px solid var(--accent);
            color: var(--accent); border-radius: 50%; width: 40px; height: 40px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <button class="settings-btn" onclick="resetKey()">⚙️</button>

    <h1>QUICKCAP AI</h1>

    <div class="preview-container">
        <video id="v" playsinline></video>
        <div id="subs">READY</div>
    </div>

    <div class="controls">
        <input type="file" id="f" accept="video/*" style="display:none">
        
        <button class="btn btn-choose" onclick="document.getElementById('f').click()">
            1. Select Video
        </button>
        
        <button id="processBtn" class="btn btn-process" onclick="startAI()">
            2. Generate Captions
        </button>

        <div id="status">Waiting for file...</div>
    </div>

<script>
    // SECURE KEY MANAGEMENT
    let DEEPGRAM_KEY = localStorage.getItem('deepgram_key');

    const v = document.getElementById('v');
    const subs = document.getElementById('subs');
    const status = document.getElementById('status');
    const processBtn = document.getElementById('processBtn');
    let wordsData = [];

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            v.src = URL.createObjectURL(file);
            processBtn.style.display = 'block';
            status.innerText = "Video synced. Ready for AI.";
        }
    };

    async function startAI() {
        // Ask for key if missing
        if (!DEEPGRAM_KEY) {
            DEEPGRAM_KEY = prompt("Enter your Deepgram API Key:");
            if (DEEPGRAM_KEY) localStorage.setItem('deepgram_key', DEEPGRAM_KEY);
            else return;
        }

        const file = document.getElementById('f').files[0];
        status.innerText = "SONIX AI is listening...";
        processBtn.disabled = true;
        processBtn.style.opacity = "0.5";
        
        try {
            const response = await fetch('https://api.deepgram.com/v1/listen?smart_format=true&model=nova-2', {
                method: 'POST',
                headers: { 
                    'Authorization': `Token ${DEEPGRAM_KEY}`, 
                    'Content-Type': file.type 
                },
                body: file
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error);

            wordsData = data.results.channels[0].alternatives[0].words;
            status.innerText = "Processing Complete. Tap Video to Play.";
            subs.innerText = "GO!";
            processBtn.style.display = "none";
        } catch (err) {
            status.innerText = "Error: Invalid Key or Network.";
            localStorage.removeItem('deepgram_key');
            DEEPGRAM_KEY = null;
        }
    }

    // High-Speed Caption Sync
    v.ontimeupdate = () => {
        const currentTime = v.currentTime;
        const currentWord = wordsData.find(w => currentTime >= w.start && currentTime <= w.end);
        
        if (currentWord) {
            const wordText = currentWord.word.toUpperCase();
            if (subs.innerText !== wordText) {
                subs.innerText = wordText;
                
                // SONIX Signature "Pop" Effect
                subs.style.transform = "scale(1.3) rotate(-3deg)";
                setTimeout(() => { 
                    subs.style.transform = "scale(1) rotate(0deg)"; 
                }, 40);
            }
        }
    };

    v.onclick = () => v.paused ? v.play() : v.pause();

    function resetKey() {
        localStorage.removeItem('deepgram_key');
        alert("API Key cleared.");
        location.reload();
    }
</script>

</body>
</html>
