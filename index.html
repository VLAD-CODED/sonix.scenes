<!DOCTYPE html> 
<html>
<head>
    <title>QuickCap AI - Auto Subtitles</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .preview { position: relative; width: 100%; max-width: 360px; margin: auto; aspect-ratio: 9/16; background: #111; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        #subs {
            position: absolute; bottom: 20%; width: 90%; left: 5%;
            color: #fff200; font-size: 40px; font-weight: 900;
            text-transform: uppercase; text-shadow: 4px 4px 0px #000;
            pointer-events: none; line-height: 1; transition: transform 0.1s;
        }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 360px; margin-left: auto; margin-right: auto; }
        .btn { padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-green { background: #00ff88; color: #000; }
        .btn-blue { background: #00d9ff; color: #000; }
        #status { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <h1>QUICKCAP AI</h1>

    <div class="preview">
        <video id="v" playsinline></video>
        <div id="subs">SELECT A VIDEO</div>
    </div>

    <div class="controls">
        <input type="file" id="f" accept="video/*" style="display:none">
        <button class="btn btn-blue" onclick="document.getElementById('f').click()">1. CHOOSE VIDEO</button>
        <button id="processBtn" class="btn btn-green" style="display:none" onclick="startAI()">2. AUTO-CAPTION (READY)</button>
        <div id="status">Waiting for file...</div>
    </div>

<script>
    const API_KEY = 'd77c8ee724d406967da92de4b088ea497e6e70a6'; // PASTE YOUR KEY HERE
    const v = document.getElementById('v');
    const subs = document.getElementById('subs');
    const status = document.getElementById('status');
    let wordsData = [];

    document.getElementById('f').onchange = (e) => {
        const file = e.target.files[0];
        v.src = URL.createObjectURL(file);
        document.getElementById('processBtn').style.display = 'block';
        status.innerText = "Video loaded. Ready to process.";
    };

    async function startAI() {
        const file = document.getElementById('f').files[0];
        status.innerText = "AI is listening... (Processing)";
        
        const response = await fetch('https://api.deepgram.com/v1/listen?smart_format=true&model=nova-2', {
            method: 'POST',
            headers: { 'Authorization': `Token ${API_KEY}`, 'Content-Type': file.type },
            body: file
        });

        const data = await response.json();
        // Get words with timestamps
        wordsData = data.results.channels[0].alternatives[0].words;
        status.innerText = "Done! Click Play.";
        subs.innerText = "READY";
    }

    v.ontimeupdate = () => {
        const currentTime = v.currentTime;
        const currentWord = wordsData.find(w => currentTime >= w.start && currentTime <= w.end);
        
        if (currentWord) {
            if (subs.innerText !== currentWord.word.toUpperCase()) {
                subs.innerText = currentWord.word.toUpperCase();
                // Speed-style Pop
                subs.style.transform = "scale(1.2) rotate(-2deg)";
                setTimeout(() => { subs.style.transform = "scale(1) rotate(0deg)"; }, 50);
            }
        }
    };

    function pp() { v.paused ? v.play() : v.pause(); }
    v.onclick = pp;
</script>

</body>
</html>
